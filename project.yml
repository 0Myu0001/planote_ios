name: Planote
options:
  bundleIdPrefix: com.planote
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait

targets:
  Planote:
    type: application
    platform: iOS
    sources:
      - path: Planote
        excludes:
          - "Preview Content"
    resources:
      - path: Planote/Assets.xcassets
      - path: Planote/Preview Content
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.planote.app
        INFOPLIST_KEY_CFBundleDisplayName: Planote
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "手書きメモから抽出した予定をカレンダーに追加するために使用します"
        INFOPLIST_KEY_NSCameraUsageDescription: "手書きメモを撮影してスケジュールを抽出するために使用します"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "手書きメモの写真を選択してスケジュールを抽出するために使用します"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"Planote/Preview Content\""