name: Planote
options:
  bundleIdPrefix: com.planote
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
  developmentLanguage: ja

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  Planote:
    type: application
    platform: iOS
    sources:
      - path: Planote
        excludes:
          - "Preview Content"
          - "Resources"
    resources:
      - path: Planote/Assets.xcassets
      - path: Planote/Preview Content
      - path: Planote/Resources/Localizable.xcstrings
      - path: Planote/Resources/InfoPlist.xcstrings
    dependencies:
      - target: PlanoteShare
    entitlements:
      path: Planote/Planote.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.planote.app
    info:
      path: Planote/Info.plist
      properties:
        CFBundleDisplayName: Planote
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: ja
        CFBundleLocalizations:
          - ja
          - en
          - zh-Hans
          - zh-Hant
          - ko
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSCalendarsFullAccessUsageDescription: "手書きメモから抽出した予定をカレンダーに追加するために使用します"
        NSCameraUsageDescription: "手書きメモを撮影してスケジュールを抽出するために使用します"
        NSPhotoLibraryUsageDescription: "手書きメモの写真を選択してスケジュールを抽出するために使用します"
        CFBundleURLTypes:
          - CFBundleURLName: com.planote.app
            CFBundleURLSchemes:
              - planote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.planote.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"Planote/Preview Content\""

  PlanoteShare:
    type: app-extension
    platform: iOS
    sources:
      - path: PlanoteShare
        excludes:
          - "Resources"
    resources:
      - path: PlanoteShare/Resources/Localizable.xcstrings
      - path: PlanoteShare/Resources/InfoPlist.xcstrings
    entitlements:
      path: PlanoteShare/PlanoteShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.planote.app
    info:
      path: PlanoteShare/Info.plist
      properties:
        CFBundleDisplayName: Planoteに送信
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: ja
        CFBundleLocalizations:
          - ja
          - en
          - zh-Hans
          - zh-Hant
          - ko
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.planote.app.share
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
